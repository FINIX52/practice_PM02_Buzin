{% extends "base.html" %}
{% block title %}Вход в систему{% endblock %}
{% block content %}
<div class="login-form">
    <h2>Авторизация - Складской учёт</h2>
    <form method="POST">
        <div class="form-group"><label>Логин:</label><input type="text" name="login" required></div>
        <div class="form-group"><label>Пароль:</label><input type="password" name="password" required></div>
        <div class="form-group"><label>Капча: сколько будет {{ num1 }} + {{ num2 }} ?</label><input type="text" name="captcha" required></div>
        <button type="submit">Войти</button>
    </form>
    <p style="text-align: center; margin-top: 20px;"><small>admin/admin123 | worker/worker123</small></p>
</div>
{% endblock %}
